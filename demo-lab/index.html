<!doctype html><html><head><meta charset="utf-8"><title>lookBOOK True Animation Demo Lab</title><meta name="viewport" content="width=device-width, initial-scale=1"><style>:root{--bg:#070a10;--panel:#121824;--line:#2b3244;--text:#fdf6d8;--muted:#aaa695;--teal:#1ae0cf;--gold:#f2ba46}*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#070a10,#0e1520);color:var(--text);font-family:Inter,Segoe UI,Arial,sans-serif}header{padding:28px;border-bottom:1px solid var(--line)}main{max-width:1260px;margin:auto;padding:24px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}.card{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:18px}.drop{border:2px dashed #42506c;border-radius:18px;min-height:280px;display:flex;align-items:center;justify-content:center;text-align:center;cursor:pointer;background:rgba(26,224,207,.04)}.drop.drag{border-color:var(--teal)}img{max-width:100%;border-radius:14px;border:1px solid var(--line);background:#000}input,select,textarea{width:100%;background:#0e1520;color:var(--text);border:1px solid var(--line);border-radius:12px;padding:11px;font:inherit;margin-top:6px}label{display:block;color:var(--teal);font-weight:800;text-transform:uppercase;font-size:12px;letter-spacing:.1em;margin-top:12px}button{background:var(--gold);color:#151008;border:0;border-radius:12px;padding:12px 16px;font-weight:900;cursor:pointer;margin:6px 6px 0 0}pre{white-space:pre-wrap;word-break:break-word;background:#080b11;border:1px solid var(--line);border-radius:14px;padding:14px;max-height:360px;overflow:auto}.badge{display:inline-block;color:var(--teal);border:1px solid var(--teal);border-radius:99px;padding:6px 10px;font-size:12px;font-weight:800}@media(max-width:900px){.grid{grid-template-columns:1fr}}</style></head><body><header><h1>lookBOOK True Animation Demo Lab</h1><p>Drop a comic page or keyframe and generate a true image-to-video handoff packet. This lab rejects fake “just sliding a still image” output.</p></header><main><div class="grid"><section class="card"><div id="drop" class="drop"><div><strong>Drop page or keyframe here</strong><br><span class="badge">local browser preview · no upload</span></div></div><input id="file" type="file" accept="image/*" hidden><br><img id="preview" hidden></section><section class="card"><label>Project Name</label><input id="project" value="Vector Bay 7"><label>Target Video Tool</label><select id="tool"><option>Runway</option><option>Google Flow / Veo</option><option>Kling</option><option>Pika</option><option>Luma</option></select><label>Scene Direction</label><textarea id="notes">Generate true animation: moving bodies, limb action, scarf/ribbon motion, attacker reactions, brute movement, and dialogue timing. Reject pan-and-zoom-only results.</textarea><button id="build">Build Packet</button><button id="download">Download JSON Bundle</button></section></div><section class="card" style="margin-top:18px"><h2>Generated true-animation packet</h2><pre id="out"></pre></section></main><script>const drop=document.getElementById('drop'),file=document.getElementById('file'),preview=document.getElementById('preview'),out=document.getElementById('out');let meta={};drop.onclick=()=>file.click();['dragenter','dragover'].forEach(e=>drop.addEventListener(e,ev=>{ev.preventDefault();drop.classList.add('drag')}));['dragleave','drop'].forEach(e=>drop.addEventListener(e,ev=>{ev.preventDefault();drop.classList.remove('drag')}));drop.addEventListener('drop',ev=>{const f=ev.dataTransfer.files[0];if(f)setFile(f)});file.onchange=e=>{const f=e.target.files[0];if(f)setFile(f)};function setFile(f){const url=URL.createObjectURL(f);preview.src=url;preview.hidden=false;const im=new Image();im.onload=()=>{meta={width:im.width,height:im.height,name:f.name};build()};im.src=url}function build(){const packet={project:document.getElementById('project').value,target_tool:document.getElementById('tool').value,source:meta,non_negotiable:'Generate true character animation, not a still-image pan.',required_motion:['body motion','limb motion','head turns','attacker reactions','scarf/ribbon motion','brute movement','dialogue timing'],reject_if:['just zooming','just sliding','only particles moving','characters morph into unrelated designs','costume resembles copyrighted superhero'],prompt:`Use the uploaded image as the keyframe reference. ${document.getElementById('notes').value} Create a short image-to-video shot where characters move inside the frame.`};out.textContent=JSON.stringify(packet,null,2);return packet}document.getElementById('build').onclick=build;document.getElementById('download').onclick=()=>{const blob=new Blob([JSON.stringify(build(),null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='lookbook_true_animation_packet.json';a.click()};build();</script></body></html>
