vision:
  provider: openai
  model: gpt-4o
  max_tokens: 2048
  temperature: 0.3

fallback:
  enabled: true
  provider: classical

quality:
  preset: high
  motion_threshold: 2
  min_duration: 1.0
  max_duration: 10.0

exporters:
  runway:
    motion_boost: true
    negative_prompt_preset: default
  veo:
    prose_style: cinematic
    negative_prompt_preset: default
  kling:
    keyword_density: high
    negative_prompt_preset: default

lab:
  port: 8042
  cors: true

telemetry:
  enabled: true
  log_dir: ~/.lookbook/telemetry
