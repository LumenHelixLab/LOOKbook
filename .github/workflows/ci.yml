name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  UV_SYSTEM_PYTHON: 1

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        run: uv pip install --system ruff
      - name: Ruff check
        run: ruff check --output-format=github .
      - name: Ruff format check
        run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        optional-deps: ["image", "vision", "archive"]
        include:
          - optional-deps: "image"
            deps: "image"
          - optional-deps: "vision"
            deps: "image,vision"
          - optional-deps: "archive"
            deps: "image,archive"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Install system deps (Tesseract OCR)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq tesseract-ocr
      - name: Install package with optional deps
        run: uv pip install --system -e ".[${{ matrix.deps }},dev]"
      - name: Run tests
        run: python -m pytest -q --tb=short

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tools
        run: python -m pip install --upgrade pip build
      - name: Build package
        run: python -m build
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
