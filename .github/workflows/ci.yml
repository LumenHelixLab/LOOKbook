name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  UV_SYSTEM_PYTHON: 1

jobs:
  typecheck:
    name: Type Check & Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        optional-deps: ["image", "vision", "archive"]
        include:
          - optional-deps: "image"
            deps: "image"
          - optional-deps: "vision"
            deps: "image,vision"
          - optional-deps: "archive"
            deps: "image,archive"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Install system deps (Tesseract OCR)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq tesseract-ocr
      - name: Install package with optional deps
        run: uv pip install --system -e ".[${{ matrix.deps }},dev]"
      - name: Run tests
        run: python -m pytest -q --tb=short --junitxml=test-results.xml
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-py${{ matrix.python-version }}-${{ matrix.optional-deps }}
          path: test-results.xml

  lab-e2e:
    name: Demo Lab E2E (Gen 2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install system deps
        run: sudo apt-get update -qq && sudo apt-get install -y -qq tesseract-ocr
      - name: Install Python lab deps
        run: pip install -e ".[lab,dev]"
      - name: Generate comic fixture
        run: python scripts/generate_comic_fixture.py
      - name: Pytest lab server + multi-panel
        run: python -m pytest tests/test_lab_server.py tests/test_scene_graph_ocr.py -q
      - name: Install Playwright
        run: npm ci && npx playwright install chromium --with-deps
      - name: Playwright demo-lab E2E
        run: npx playwright test tests/e2e/demo-lab.spec.mjs

  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [typecheck, lab-e2e]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tools
        run: python -m pip install --upgrade pip build
      - name: Build package
        run: python -m build
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
